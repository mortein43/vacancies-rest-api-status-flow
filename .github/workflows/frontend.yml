name: Frontend CI

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

  push:
    branches: [develop, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
